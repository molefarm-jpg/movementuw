name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set VITE_BASE for custom domain root
        run: echo "VITE_BASE=/" >> $GITHUB_ENV

      - name: Install
        working-directory: ./app
        run: npm ci

      - name: Build
        working-directory: ./app
        run: npm run build

      - name: Ensure SPA fallback
        run: cp app/dist/index.html app/dist/404.html || true

      - name: Deploy to GitHub Pages
        run: |
          cd app/dist
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git init
          git add -A
          git commit -m "Deploy: $(cd .. && git rev-parse --short HEAD)"
          git push -f https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/molefarm-jpg/movementuw.git HEAD:gh-pages
